<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Attendance | Employee Management System</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="auth.js"></script>

</head>

<body class="bg-light">
<script>
  checkAuth("employee");
</script>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-4 justify-content-between">
<a href="employee-dashboard.html" class="navbar-brand">← Dashboard</a>
  <span class="navbar-text text-white fw-bold">Attendance</span>
</nav>

<div class="container mt-4">

  <!-- MARK ATTENDANCE -->
  <div class="card shadow-sm mb-4">
    <div class="card-header bg-warning fw-bold">
      Mark Attendance (Login)
    </div>

    <div class="card-body">
      <form id="attendanceForm" class="row g-3">

        <div class="col-md-6">
          <label class="form-label">Employee</label>
          <select id="employee" class="form-select" required>
            <option value="">Select Employee</option>
          </select>
        </div>

        <div class="col-md-6 d-flex align-items-end">
          <button class="btn btn-success w-100">
            Mark Login
          </button>
        </div>

      </form>

      <div id="message" class="mt-3"></div>
    </div>
  </div>

  <!-- ATTENDANCE TABLE -->
  <div class="card shadow-sm">
    <div class="card-header bg-primary text-white fw-bold">
      Attendance Records
    </div>

    <div class="card-body p-0">
      <table class="table table-striped mb-0">
        <thead class="table-dark">
          <tr>
            <th>Employee</th>
            <th>Email</th>
            <th>Date</th>
            <th>Login</th>
            <th>Logout</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody id="attendanceTable">
          <!-- JS inserts rows -->
        </tbody>
      </table>
    </div>
  </div>

</div>

<script src="attendance.js"></script>
</body>
</html>

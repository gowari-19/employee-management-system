<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Employees | Employee Management System</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  <script src="auth.js"></script>

</head>

<body class="bg-light">
<script>
  checkAuth("admin");
</script>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-4">
  <a href="dashboard.html" class="navbar-brand">← Dashboard</a>
  <span class="navbar-text text-white fw-bold">Employee List</span>

</nav>

<div class="container mt-4">

  <div class="card shadow-sm">
    <div class="card-header fw-bold bg-success text-white">
      All Employees
    </div>

    <div class="card-body p-0">

      <table class="table table-striped table-hover mb-0">
        <thead class="table-dark">
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Department</th>
            <th>Designation</th>
            <th>Age</th>
            <th>Experience</th>
            <th>Salary</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody id="employeeTable">
          <!-- JS will insert rows here -->
        </tbody>
      </table>

    </div>
  </div>

</div>

<script src="employees.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reports | Employee Management System</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="auth.js"></script>

</head>
<body class="bg-light">
<script>
  checkAuth("admin");
</script>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-4">
  <a href="dashboard.html" class="navbar-brand">← Dashboard</a>
  <span class="navbar-text text-white fw-bold">Reports</span>

</nav>

<div class="container mt-4">

  <!-- ATTENDANCE REPORT -->
  <div class="card shadow-sm mb-4">
    <div class="card-header bg-warning fw-bold">
      Attendance Report
    </div>

    <div class="card-body">

      <input type="date" id="attendanceDate" class="form-control mb-3">

      <table class="table table-bordered">
        <thead class="table-light">
          <tr>
            <th>Employee</th>
            <th>Date</th>
            <th>Login</th>
            <th>Logout</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="attendanceReportTable">
          <tr>
            <td colspan="5" class="text-center text-muted">
              Select a date to view attendance
            </td>
          </tr>
        </tbody>
      </table>

    </div>
  </div>

  <!-- LEAVE REPORT -->
  <div class="card shadow-sm">
    <div class="card-header bg-info fw-bold">
      Leave Report
    </div>

    <div class="card-body">

      <select id="leaveStatus" class="form-select mb-3">
        <option value="">All</option>
        <option value="Pending">Pending</option>
        <option value="Approved">Approved</option>
        <option value="Rejected">Rejected</option>
      </select>

      <table class="table table-bordered">
        <thead class="table-light">
          <tr>
            <th>Employee</th>
            <th>Type</th>
            <th>From</th>
            <th>To</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="leaveReportTable">
          <tr>
            <td colspan="5" class="text-center text-muted">
              Select status to view leave records
            </td>
          </tr>
        </tbody>
      </table>

    </div>
  </div>

</div>

<script src="reports.js"></script>
</body>
</html>

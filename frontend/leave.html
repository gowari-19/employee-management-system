<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Leave Management</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="auth.js"></script>

</head>

<body class="bg-light">
<script>
  checkAuth("employee");
</script>
<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-4 justify-content-between">

<a href="employee-dashboard.html" class="navbar-brand">← Dashboard</a>
  <span class="navbar-text text-white fw-bold">Leave Management</span>
</nav>

<div class="container mt-4">

  <div class="card shadow-sm">
    <div class="card-header bg-info text-white fw-bold">
      Apply Leave
    </div>

    <div class="card-body">

      <form id="leaveForm">

        <!-- EMPLOYEE -->
        <div class="mb-3">
          <label class="form-label">Employee</label>
          <select id="employeeId" class="form-select" required>
            <option value="">Select Employee</option>
          </select>
        </div>

        <!-- LEAVE TYPE -->
        <div class="mb-3">
          <label class="form-label">Leave Type</label>
          <select id="leaveType" class="form-select" required>
            <option value="">Select Leave Type</option>
            <option value="Sick">Sick</option>
            <option value="Casual">Casual</option>
            <option value="Paid">Paid</option>
          </select>
        </div>

        <!-- FROM & TO DATE -->
        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">From Date</label>
            <input type="date" id="fromDate" class="form-control" required>
          </div>

          <div class="col-md-6">
            <label class="form-label">To Date</label>
            <input type="date" id="toDate" class="form-control" required>
          </div>
        </div>

        <!-- REASON -->
        <div class="mb-3">
          <label class="form-label">Reason</label>
          <textarea id="reason" class="form-control" rows="3"></textarea>
        </div>

        <button class="btn btn-info w-100 py-2">
          Apply Leave
        </button>

      </form>

      <div id="message" class="mt-3"></div>

    </div>
  </div>

</div>

<script src="leave.js"></script>
</body>
</html>
